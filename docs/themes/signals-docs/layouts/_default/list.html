{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
{{ if .Pages }}
<div class="time-list">
  <ul>
    {{ range .Pages.ByWeight }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ with .Params.description }}<span class="text-muted"> — {{ . }}</span>{{ end }}
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
{{ end }}
